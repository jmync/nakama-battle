<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" href="/favicon.png" />
<title>NKMA Chorus Battle · Smule</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Black+Ops+One&family=Bungee&family=Dela+Gothic+One&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Oswald:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<!-- Preload custom fonts so they arrive ASAP and the loader can hide the swap -->
<link rel="preload" href="/fonts/PerfectAction.ttf" as="font" type="font/ttf" crossorigin />
<link rel="preload" href="/fonts/Haruto.ttf" as="font" type="font/ttf" crossorigin />
<!-- Loader styles are inline so the loader itself never flashes unstyled -->
<style>
  #loader{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
    background:#140a0e;transition:opacity .5s ease;}
  #loader.hide{opacity:0;pointer-events:none;}
  #loader .ring{width:64px;height:64px;border-radius:50%;
    border:3px solid rgba(255,56,56,.18);border-top-color:#ff3838;
    box-shadow:0 0 18px rgba(255,56,56,.45);
    animation:nkma-spin .9s linear infinite;}
  @keyframes nkma-spin{to{transform:rotate(360deg)}}

  /* Site-in-progress lock: minimalist, techy mono. */
  #wip-lock{position:fixed;inset:0;z-index:9991;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:24px;
    background:radial-gradient(125% 100% at 50% 35%, #15090c 0%, #0a0507 55%, #050304 100%);
    color:#ede6da;font-family:'JetBrains Mono','Space Mono',ui-monospace,monospace;}
  #wip-lock .badge{width:74px;height:74px;border-radius:50%;margin-bottom:34px;opacity:.9;
    background:url("/favicon.png") center/cover no-repeat;}
  #wip-lock .tag{font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:#7d6f72;margin-bottom:18px;}
  #wip-lock h1{font-weight:700;font-size:clamp(22px,5vw,40px);letter-spacing:.08em;color:#f4ece4;margin:0;}
  #wip-lock h1 .br{color:#e0354a;}
  #wip-lock .cur{display:inline-block;width:.6ch;height:1em;margin-left:.12em;vertical-align:-2px;
    background:#e0354a;animation:wip-cur 1.1s steps(1) infinite;}
  @keyframes wip-cur{0%,50%{opacity:1}51%,100%{opacity:0}}
  #wip-lock .line{margin-top:22px;font-size:12px;letter-spacing:.12em;color:#8a7c7f;}
</style>
</head>
<body>
  <div id="loader"><div class="ring"></div></div>

  <canvas id="bg-canvas"></canvas>
  <div class="bg-glow"></div>
  <div class="bg-grain"></div>

  <div id="root"></div>

  <!-- Site-in-progress lock (ON — comment out this div to take the site live) -->
  <div id="wip-lock">
    <div class="tag">NKMA Chorus Battle</div>
    <h1>SITE IN <span class="br">PROGRESS</span><span class="cur"></span></h1>
  </div>

  <script type="module" src="/main.jsx"></script>
  <script>
    // Hide the loader once the page is ready and custom fonts have loaded,
    // so the font swap happens behind the loader (no visible FOUT).
    (function () {
      var loader = document.getElementById('loader');
      function hide() {
        if (!loader) return;
        loader.classList.add('hide');
        setTimeout(function () { loader.remove(); }, 600);
      }
      var done = false;
      function ready() { if (done) return; done = true; hide(); }
      var fontsReady = document.fonts && document.fonts.ready
        ? document.fonts.ready : Promise.resolve();
      Promise.all([
        fontsReady,
        new Promise(function (res) {
          if (document.readyState === 'complete') res();
          else window.addEventListener('load', res, { once: true });
        })
      ]).then(ready);
      // Safety: never let the loader hang longer than 4s
      setTimeout(ready, 4000);
    })();
  </script>
</body>
</html>
